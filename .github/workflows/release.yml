name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pr:
    name: Pull request
    runs-on: ubuntu-latest

    if: github.repository_owner == 'tonywu6'

    permissions:
      contents: write
      pull-requests: write

    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          # token is required to not commit as github-actions[bot]
          # otherwise CI will not run
          token: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN }}

      - uses: ./.github/actions/docs-setup
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: just docs readme

      - uses: release-plz/action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest

    if: github.repository_owner == 'tonywu6'

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - uses: release-plz/action@v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
