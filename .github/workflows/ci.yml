name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**/Cargo.*"
      - "**/*.rs"
      - "**/*.snap"
      - ".github/workflows/ci.yml"

  pull_request:
    branches:
      - main

  schedule:
    - cron: "32 21 1 * *"
      timezone: America/New_York

  workflow_dispatch:
    inputs:
      windows:
        default: false
        type: boolean
      macos:
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.platform }})

    if: ${{ !(github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-plz-')) }}
    # don't run on release-plz branches because they are updated only after
    # CI is already successful on main

    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - windows-latest
          - macos-latest

        windows:
          - ${{ inputs.windows || false }}
        macos:
          - ${{ inputs.macos || false }}

        exclude:
          - platform: windows-latest
            windows: false
          - platform: macos-latest
            macos: false

      fail-fast: false

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu
          components: rust-src, llvm-tools
        id: rustup

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu
          components: rust-src, llvm-tools
        id: rustup-nightly

      - run: rustup default stable
        shell: bash

      - uses: taiki-e/install-action@v2
        with:
          tool: |
            cargo-binstall
            just@1.51.0

      - uses: tonywu6/cache-hit-please@v1.1.1
        id: cache
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          deps: |
            ${{runner.os}}
            ${{runner.arch}}
            ${{steps.rustup.outputs.cachekey}}
            ${{hashFiles('**/Cargo.toml')}}
            ${{hashFiles('**/Cargo.lock')}}
            ${{github.workflow}}
            ${{github.run_id}}
          path: |
            .bin/
            target/

      - name: Prepare binaries
        run: |
          cargo bin -- --install
        shell: bash

      - name: Test
        run: |
          just cov --no-fail-fast
        shell: bash

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: llvm-cov
          path: target/llvm-cov/html
