[book]
authors = ["Tony Wu"]
language = "en"
src = "src"
title = "mdbookkit"

[build]
build-dir = "dist/mdbookkit"
create-missing = false
extra-watch-dirs = ["bin", "scripts", "web", "Cargo.toml", "../README.md"]
use-default-preprocessors = false

[output.html]
additional-css = ["web/loader.css"]
additional-js = ["web/loader.js"]
default-theme = "ayu"
git-repository-icon = "fab-github"
git-repository-url = "https://github.com/tonywu6/mdbookkit"
hash-files = true
preferred-dark-theme = "ayu"
site-url = "https://docs.tonywu.dev/mdbookkit/"

[output.html.playground]
runnable = false

[preprocessor.rustdoc-links]
after = ["doc"]
command = "cargo run --package mdbook-rustdoc-links"

[preprocessor.rustdoc-links.build]
packages = [
  "annotate-snippets",
  "mdbookkit",
  "serde",
  "tracing-subscriber",
  "url",
]
preludes = [
  "std::marker::PhantomData",
  "mdbookkit::{env, markdown}",
  "tracing_subscriber::{fmt, EnvFilter, Layer}",
]

[preprocessor.permalinks]
after = ["doc", "rustdoc-links"]
command = "cargo run --package mdbook-permalinks"
dev-mode = true
unstable-features = true

[preprocessor.app]
command = "node scripts/preprocessor.ts"

[preprocessor.doc]
command = "cargo run -- preprocess"

[preprocessor.doc.socials."/"]
image = "src/media/social.webp"
title = "mdbookkit"

[preprocessor.doc.socials."/rustdoc-links/"]
image = "src/rustdoc-links/media/social.webp"
title = "mdbook-rustdoc-links"

[preprocessor.doc.socials."/permalinks/"]
image = "src/permalinks/media/social.webp"
title = "mdbook-permalinks"
