<svg width="886px" height="218px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #B2B2B2 }
    .bg { fill: #1A1A1A }
    .fg-red { fill: #E06C75 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px Menlo, Roboto Mono, Ubuntu Mono, Liberation Mono, Consolas, ui-monospace, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0"  class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-red">ERROR</tspan><tspan> </tspan><tspan class="bold">mdbook-permalinks</tspan><tspan>: failed to initialize preprocessor</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan>Caused by:</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>    0: failed to read config from book.toml</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>    1: TOML parse error at line 4, column 3</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>         |</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan>       4 |   [</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>         |   ^</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>       expected at least 1 item</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>       </tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>ERROR mdbook_core::utils: The "permalinks" preprocessor exited unsuccessfully with [EXIT_CODE] 1 status</tspan>
</tspan>
  </text>

</svg>
