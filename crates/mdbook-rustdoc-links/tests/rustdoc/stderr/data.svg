<svg width="740px" height="380px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #B2B2B2 }
    .bg { fill: #1A1A1A }
    .fg-bright-blue { fill: #5CADF1 }
    .fg-bright-cyan { fill: #51B5C3 }
    .fg-bright-green { fill: #96C475 }
    .fg-yellow { fill: #D19A66 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px Menlo, Roboto Mono, Ubuntu Mono, Liberation Mono, Consolas, ui-monospace, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-yellow bold">warning</tspan><tspan class="bold">: unresolved link to `std::Option`</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan> </tspan><tspan class="fg-bright-blue bold">--&gt; </tspan><tspan>basic.md:2:12</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="fg-bright-blue bold">2</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> - [option](</tspan><tspan class="fg-yellow bold">std::Option</tspan><tspan>)</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>            </tspan><tspan class="fg-yellow bold">^^^^^^^^^^^</tspan><tspan> </tspan><tspan class="fg-yellow bold">no item named `Option` in module `std`</tspan>
</tspan>
    <tspan x="10px" y="118px">
</tspan>
    <tspan x="10px" y="136px"><tspan class="fg-yellow bold">warning</tspan><tspan class="bold">: `std::vec` is both a module and a macro</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan> </tspan><tspan class="fg-bright-blue bold">--&gt; </tspan><tspan>basic.md:6:8</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan class="fg-bright-blue bold">6</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> [vec]: </tspan><tspan class="fg-yellow bold">std::vec</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>        </tspan><tspan class="fg-yellow bold">^^^^^^^^</tspan><tspan> </tspan><tspan class="fg-yellow bold">ambiguous link</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan class="fg-bright-cyan bold">help</tspan><tspan>: to link to the module, prefix with `mod@`</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="280px"><tspan class="fg-bright-blue bold">6</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">| </tspan><tspan>[vec]: </tspan><tspan class="fg-bright-green">mod@</tspan><tspan>std::vec</tspan>
</tspan>
    <tspan x="10px" y="298px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>        </tspan><tspan class="fg-bright-green">++++</tspan>
</tspan>
    <tspan x="10px" y="316px"><tspan class="fg-bright-cyan bold">help</tspan><tspan>: to link to the macro, add an exclamation mark</tspan>
</tspan>
    <tspan x="10px" y="334px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="352px"><tspan class="fg-bright-blue bold">6</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">| </tspan><tspan>[vec]: std::vec</tspan><tspan class="fg-bright-green">!</tspan>
</tspan>
    <tspan x="10px" y="370px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>                </tspan><tspan class="fg-bright-green">+</tspan>
</tspan>
  </text>

</svg>
