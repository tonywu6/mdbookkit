<svg width="911px" height="236px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #B2B2B2 }
    .bg { fill: #1A1A1A }
    .fg-red { fill: #E06C75 }
    .fg-yellow { fill: #D19A66 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px Menlo, Roboto Mono, Ubuntu Mono, Liberation Mono, Consolas, ui-monospace, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0"  class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-yellow"> WARN</tspan><tspan> </tspan><tspan class="bold">mdbook-rustdoc-links</tspan><tspan>: error while resolving package versions</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan>Caused by:</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>    0: failed to spawn command</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>    1: [ENOENT]</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>    2: [COMMAND_DEBUG] ":"</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan>       </tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>note: the following options have been specified, which may have caused the error:</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>    - build.runner</tspan>
</tspan>
    <tspan x="10px" y="190px">
</tspan>
    <tspan x="10px" y="208px"><tspan class="fg-red">ERROR</tspan><tspan> </tspan><tspan class="bold">mdbook-rustdoc-links</tspan><tspan>: build failed</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>ERROR mdbook_core::utils: The "rustdoc-links" preprocessor exited unsuccessfully with [EXIT_CODE] 1 status</tspan>
</tspan>
  </text>

</svg>
