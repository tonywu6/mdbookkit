<svg width="978px" height="290px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #B2B2B2 }
    .bg { fill: #1A1A1A }
    .fg-red { fill: #E06C75 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px Menlo, Roboto Mono, Ubuntu Mono, Liberation Mono, Consolas, ui-monospace, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0"  class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-red">ERROR</tspan><tspan> </tspan><tspan class="bold">mdbook-rustdoc-links</tspan><tspan>: failed to find a Cargo project</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan>Caused by:</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>    0: this preprocessor will run `cargo doc`, which requires a Cargo project</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>    1: `cargo locate-project` did not run successfully</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>    2: --- stderr</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan>       error: failed to parse manifest at `[TEST_DIR]/manifest_invalid/Cargo.toml`</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>       </tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>       Caused by:</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>         `resolver` setting `000` is not valid, valid options are "1", "2" or "3"</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>    3: command exited with exit status: 101</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>    4: command: cd "[TEST_DIR]/manifest_invalid" &amp;&amp; "cargo" "locate-project" "--message-format=json" "--workspace"</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan>       </tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>[LLVM_COV_STDERR]</tspan>
</tspan>
    <tspan x="10px" y="280px"><tspan>ERROR mdbook_core::utils: The "rustdoc-links" preprocessor exited unsuccessfully with exit status: 1 status</tspan>
</tspan>
  </text>

</svg>
