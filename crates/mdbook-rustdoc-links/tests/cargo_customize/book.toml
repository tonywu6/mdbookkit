[preprocessor.rustdoc-links]
after = ["links"]
command = "cargo preprocessor"

[preprocessor.rustdoc-links.build]
cargo-args = ["-Z", "build-dir-new-layout"]
rustc-args = ["--check-cfg", "cfg(mdbook)", "--cfg", "mdbook"]
rustdoc-args = ["-Z", "unstable-options", "--document-hidden-items"]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
toolchain = "nightly"

[build]
build-dir = "dist"
create-missing = false

[output.markdown]
