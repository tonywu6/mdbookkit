<svg width="1432px" height="272px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #B2B2B2 }
    .bg { fill: #1A1A1A }
    .fg-red { fill: #E06C75 }
    .fg-yellow { fill: #D19A66 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px Menlo, Roboto Mono, Ubuntu Mono, Liberation Mono, Consolas, ui-monospace, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-yellow"> WARN</tspan><tspan> </tspan><tspan class="bold">mdbook-rustdoc-links</tspan><tspan>: could not obtain info about the packages to build docs for</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan>Caused by:</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan>    0: --- stderr</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>       error: expected a version like "1.32"</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>    1: command exited with exit status: 101</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan>    2: command: cd "[TEST_DIR]/packages_invalid" &amp;&amp; "cargo" "tree" "--no-dedupe" "--format" "{p}" "--prefix" "none" "--edges" "normal" "--package" "@@@@@" "--depth" "0"</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan>       </tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>note: the following options have been specified, which may have caused the error:</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>- build.packages</tspan>
</tspan>
    <tspan x="10px" y="208px">
</tspan>
    <tspan x="10px" y="226px"><tspan class="fg-red">ERROR</tspan><tspan> </tspan><tspan class="bold">mdbook-rustdoc-links</tspan><tspan>: build failed</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan>[LLVM_COV_STDERR]</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>ERROR mdbook_core::utils: The "rustdoc-links" preprocessor exited unsuccessfully with exit status: 1 status</tspan>
</tspan>
  </text>

</svg>
