[preprocessor.rustdoc-links]
after = ["links"]
command = "cargo preprocessor"

base-url = "/api"

[[preprocessor.rustdoc-links.build]]
packages = ["utf8parse"]
targets = ["x86_64-unknown-linux-gnu"]

[[preprocessor.rustdoc-links.build]]
packages = ["pin-project-lite"]
targets = ["aarch64-unknown-linux-gnu"]

[[preprocessor.rustdoc-links.build]]
packages = [{ workspace = true, dependencies = false }]

[build]
build-dir = "dist"
create-missing = false

[output.markdown]
